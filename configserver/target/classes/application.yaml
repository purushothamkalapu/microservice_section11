spring:
  application:
    name: "configserver"
  profiles:
    active: git
  #active: native

  cloud:
    config:
      server:
        git:
          uri: "https://github.com/purushothamkalapu/config.git"
          default-label: "practice_022026"
          timeout: 5
          clone-on-start: true
          force-pull: true

encrypt:
  key: "A3431E28645CC8D9FA5EB4D42AD6D"
#native:
          #search-locations: "classpath:/config"
          #search-locations: "file:///Users//purushotham//Documents//config"

management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true
server:
  port: 8071

metrics:
  tags:
    application: ${spring.application.name}
